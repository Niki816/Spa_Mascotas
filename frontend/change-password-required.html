<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambio de contraseña requerido — Pet Spa</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep: #1e3a2f;
      --green-mid:  #2d5a45;
      --green-soft: #4a8c6f;
      --green-light:#a8d5b5;
      --green-pale: #e8f5ed;
      --cream:      #faf7f2;
      --amber:      #d4845a;
      --text-dark:  #1a2e25;
      --text-mid:   #4a6355;
      --text-light: #8aab97;
      --shadow:     0 8px 32px rgba(30,58,47,.13);
      --radius:     18px;
      --radius-sm:  10px;
      --red:        #dc2626;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 2rem;
      animation: fadeUp .35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      text-align: center;
      margin-bottom: 1.6rem;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: var(--amber);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: .5rem;
    }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--green-deep); }
    .logo p  { font-size: .85rem; color: var(--text-light); margin-top: 2px; }

    .notice-banner {
      background: #fffbeb;
      border: 1.5px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 13px 15px;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .notice-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .notice-text { font-size: .84rem; color: #92400e; line-height: 1.5; }
    .notice-text strong { font-weight: 600; }

    .pw-rules {
      background: var(--green-pale);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 1.1rem;
    }
    .pw-rule {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .8rem;
      color: var(--text-mid);
      margin-bottom: 4px;
      transition: color .2s;
    }
    .pw-rule:last-child { margin-bottom: 0; }
    .pw-rule .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c8ddd2;
      flex-shrink: 0;
      transition: background .2s;
    }
    .pw-rule.ok .dot { background: var(--green-soft); }
    .pw-rule.ok      { color: var(--green-mid); }

    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: .35rem;
    }
    .pass-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 10px 42px 10px 12px;
      border: 1.5px solid #e0ebe5;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: .93rem;
      color: var(--text-dark);
      background: var(--cream);
      outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--green-soft); background: white; }
    .form-input.error { border-color: var(--red); }
    .eye-btn {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 15px;
      color: var(--text-light);
    }
    .eye-btn:hover { color: var(--green-soft); }

    .strength-wrap { margin-top: 5px; }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #e0ebe5;
      overflow: hidden;
      margin-bottom: 3px;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width .3s, background .3s;
    }
    .strength-label { font-size: .74rem; color: var(--text-light); }

    .field-error {
      font-size: .78rem;
      color: var(--red);
      margin-top: 4px;
      display: none;
    }
    .field-error.show { display: block; }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      margin-top: .4rem;
    }
    .btn-primary { background: var(--green-deep); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--green-mid); }
    .btn-primary:disabled { background: #b0c8bc; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: .84rem;
      margin-top: .9rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-success { background: var(--green-pale); color: var(--green-mid); border: 1px solid var(--green-light); }
    .alert-error   { background: #fdecea; color: #c0392b; border: 1px solid #f5c6c0; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-icon">🐾</div>
    <h1>Pet Spa</h1>
    <p>Cambio de contraseña requerido</p>
  </div>

  <div class="notice-banner">
    <span class="notice-icon">🔒</span>
    <div class="notice-text">
      <strong>Por seguridad debes cambiar tu contraseña</strong> antes de continuar.
      Solo se solicita en el primer acceso al sistema.
    </div>
  </div>

  <div class="pw-rules">
    <div class="pw-rule" id="rule-len">
      <div class="dot"></div><span>Mínimo 8 caracteres</span>
    </div>
    <div class="pw-rule" id="rule-upper">
      <div class="dot"></div><span>Al menos una mayúscula</span>
    </div>
    <div class="pw-rule" id="rule-lower">
      <div class="dot"></div><span>Al menos una minúscula</span>
    </div>
    <div class="pw-rule" id="rule-num">
      <div class="dot"></div><span>Al menos un número</span>
    </div>
    <div class="pw-rule" id="rule-sym">
      <div class="dot"></div><span>Al menos un símbolo (@$!%*?&)</span>
    </div>
  </div>

  <form id="changeForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="newPassword">Nueva contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="newPassword" class="form-input"
               placeholder="Ingresa tu nueva contraseña"
               autocomplete="new-password" required>
        <button type="button" class="eye-btn" onclick="togglePass('newPassword', this)">👁️</button>
      </div>
      <div class="strength-wrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="strength-label" id="strengthLabel"></span>
      </div>
      <div class="field-error" id="errNew"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirmPassword">Confirmar nueva contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="confirmPassword" class="form-input"
               placeholder="Repite tu nueva contraseña"
               autocomplete="new-password" required>
        <button type="button" class="eye-btn" onclick="togglePass('confirmPassword', this)">👁️</button>
      </div>
      <div class="field-error" id="errConfirm"></div>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
      🔒 Guardar nueva contraseña
    </button>
  </form>

  <div class="alert" id="formAlert"></div>
</div>

<script>
  
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}
</script>

<script type="module">
import { getAccessToken, getUser, clearTokens, authFetch, saveUser, API_URL } from './js/auth.js';

// ── Proteger ruta ──────────────────────────────────────────
const token = getAccessToken();
const user  = getUser();

if (!token || !user) {
  clearTokens();
  window.location.href = 'index.html';
  throw new Error('No autenticado');
}

if (!user?.debeCambiarPassword) {
    // Redirigir según rol al dashboard que corresponda
    if (user?.rol === 'admin') window.location.href = 'admin-dashboard.html';
    else if (user?.rol === 'groomer') window.location.href = 'groomer-dashboard.html';
    else window.location.href = 'cliente-dashboard.html';
    throw new Error('No se requiere cambio de contraseña');
  }
// ── Referencias DOM ────────────────────────────────────────
const newPwInput  = document.getElementById('newPassword');
const confPwInput = document.getElementById('confirmPassword');
const submitBtn   = document.getElementById('submitBtn');
const fillEl      = document.getElementById('strengthFill');
const labelEl     = document.getElementById('strengthLabel');
const alertEl     = document.getElementById('formAlert');

// ── Reglas de validación ───────────────────────────────────
const RULES = [
  { id: 'rule-len',   test: v => v.length >= 8 },
  { id: 'rule-upper', test: v => /[A-Z]/.test(v) },
  { id: 'rule-lower', test: v => /[a-z]/.test(v) },
  { id: 'rule-num',   test: v => /[0-9]/.test(v) },
  { id: 'rule-sym',   test: v => /[@$!%*?&]/.test(v) },
];

const STRENGTH = [
  { label: '',           color: '#e0ebe5', pct: '0%'   },
  { label: 'Muy débil',  color: '#ef4444', pct: '20%'  },
  { label: 'Débil',      color: '#f97316', pct: '40%'  },
  { label: 'Media',      color: '#eab308', pct: '65%'  },
  { label: 'Fuerte',     color: '#22c55e', pct: '100%' },
];

function updateRules(val) {
  let passed = 0;
  RULES.forEach(r => {
    const ok = r.test(val);
    if (ok) passed++;
    document.getElementById(r.id).classList.toggle('ok', ok);
  });
  return passed;
}

function updateStrength(passed) {
  const lvl = STRENGTH[Math.min(passed, 4)];
  fillEl.style.width      = lvl.pct;
  fillEl.style.background = lvl.color;
  labelEl.textContent     = lvl.label;
  labelEl.style.color     = lvl.color;
}

function isValid(val) {
  return RULES.every(r => r.test(val));
}

function checkReady() {
  const nv = newPwInput.value;
  const cv = confPwInput.value;
  submitBtn.disabled = !(isValid(nv) && cv === nv && cv.length > 0);
}

// ── Listeners ──────────────────────────────────────────────
newPwInput.addEventListener('input', () => {
  const val = newPwInput.value;
  updateStrength(updateRules(val));
  document.getElementById('errNew').classList.remove('show');
  newPwInput.classList.remove('error');
  checkReady();
});

confPwInput.addEventListener('input', () => {
  const errEl = document.getElementById('errConfirm');
  if (confPwInput.value && confPwInput.value !== newPwInput.value) {
    errEl.textContent = 'Las contraseñas no coinciden';
    errEl.classList.add('show');
    confPwInput.classList.add('error');
  } else {
    errEl.classList.remove('show');
    confPwInput.classList.remove('error');
  }
  checkReady();
});

// ── Submit ─────────────────────────────────────────────────
document.getElementById('changeForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const newVal  = newPwInput.value;
  const confVal = confPwInput.value;

  if (!isValid(newVal)) {
    const errEl = document.getElementById('errNew');
    errEl.textContent = 'La contraseña no cumple todos los requisitos';
    errEl.classList.add('show');
    newPwInput.classList.add('error');
    return;
  }
  if (newVal !== confVal) {
    const errEl = document.getElementById('errConfirm');
    errEl.textContent = 'Las contraseñas no coinciden';
    errEl.classList.add('show');
    confPwInput.classList.add('error');
    return;
  }

  submitBtn.disabled    = true;
  submitBtn.textContent = 'Guardando...';
  alertEl.className     = 'alert';

  try {
    const res  = await authFetch(`${API_URL}/first-login-change-password`, {
      method: 'POST',
      body:   JSON.stringify({ newPassword: newVal }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    // Limpiar flag debeCambiarPassword del localStorage
    const userData = getUser();
    if (userData) {
      userData.debeCambiarPassword = false;
      saveUser(userData);
    }

    alertEl.textContent = '✅ Contraseña actualizada. Inicia sesión con tu nueva contraseña.';
    alertEl.className   = 'alert alert-success show';

    // Cerrar sesión y redirigir al login
    setTimeout(() => {
      clearTokens();
      window.location.href = 'index.html';
    }, 2200);

  } catch (err) {
    alertEl.textContent   = err.message;
    alertEl.className     = 'alert alert-error show';
    submitBtn.disabled    = false;
    submitBtn.textContent = '🔒 Guardar nueva contraseña';
  }
});
</script>
</body>
</html>
